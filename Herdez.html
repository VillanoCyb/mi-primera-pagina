<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herdez - Registra tu código</title>
    <link rel="stylesheet" href="Herdez.css">
</head>
<body>
    <main>
        <section class="hero">
            <div class="hero-texto">
                <h1>Registra tu código y gana</h1>
                <p>compra productos Herdez y participa en nuestra promoción</p>
            </div>
        </section>

        <section class="formulario">
            <form>
                <input type="text" placeholder="Código de ticket">
                <input type="text" placeholder="Nombre completo">
                <input type="email" placeholder="email">
                <input type="tel" placeholder="Teléfono">
                <button type="submit">Enviar</button>
            </form>
        </section>
    </main>
</body>
</html>
