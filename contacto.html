<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Contacto</title>
    </head>

    <body>
        <header>
            <h1>Contactame</h1>
            <p>¿Tienes un proyecto de diseño? Escríbeme</p>
        </header>

        <main>
            <form>
                <label>Nombre Completo</label>
                <input type="text">
                
                <label>Correo Electrónico</label>
                <input type="email">

                <label>Tipo de proyecto</label>
                <select>
                    <option>Material POP</option>
                    <option>Campaña de Mercadotecnia</option>
                    <option>Identidad gráfica</option>
                    <option>Evento o Activación</option>
                </select>

                <label>Cuéntame  sobre tu proyecto</label>
                <textarea></textarea>

                <label>¿Cual es tu presupuesto aproximado?</label>
                <input type="number">

                <button type="submit">Enviar mensaje</button>
            </form>
        </main>
    </body>

</html>
